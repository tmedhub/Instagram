<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaRaj</title>
<style>
body { margin:0; font-family:sans-serif; background:#000; color:#fff; }
.screen { display:none; height:100vh; flex-direction:column; }
.screen.active { display:flex; }
.topbar { padding:10px; border-bottom:1px solid #222; }
.game-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
button { padding:10px 20px; border:none; border-radius:10px; background:#0095f6; color:#fff; font-weight:bold; }
canvas { background:#111; border-radius:12px; }
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="topbar">InstaRaj</div>
  <div class="game-screen">
    <button onclick="go('beer')">🍺 Beer Pong</button><br><br>
    <button onclick="go('cig')">🚬 Save the Cig</button><br><br>
    <button onclick="go('bad')">🏸 Badminton</button>
  </div>
</div>

<!-- BEER -->
<div id="beer" class="screen">
  <div class="topbar">Beer Pong</div>
  <div class="game-screen">
    <button id="openBeer">Open Beer Pong</button>
    <p>bottoms up rajath!!</p>
    <button onclick="go('home')">Back</button>
  </div>
</div>

<!-- BADMINTON -->
<div id="bad" class="screen">
  <div class="topbar">BadminRaj</div>
  <div class="game-screen">
    <h2>tom morning badminton?</h2>
    <button id="yesBtn">Yes obviously</button>
    <p>in that case</p>
    <button id="badLink">Take me to badminton site</button>
    <button onclick="go('home')">Back</button>
  </div>
</div>

<!-- CIG -->
<div id="cig" class="screen">
  <div class="topbar">Save The Cig</div>
  <div class="game-screen">
    <canvas id="cigCanvas" width="320" height="400"></canvas>
    <p id="cigMsg">protect the priority</p>
    <p id="lives">🔥🔥🔥</p>
    <button onclick="startCig()">Start</button>
    <button onclick="go('home')">Back</button>
  </div>
</div>

<script>

/* ---------- NAV ---------- */
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---------- BEER ---------- */
document.getElementById("openBeer").onclick = () => {
  window.open("https://6games.eu/games/718-beer-pong.html", "_blank");
};

/* ---------- BAD ---------- */
document.getElementById("yesBtn").onclick = () => {
  alert("proof tomorrow 7am 🏸");
};
document.getElementById("badLink").onclick = () => {
  window.open("https://poki.com/en/g/power-badminton", "_blank");
};

/* ---------- CIG GAME ---------- */
let canvas = document.getElementById("cigCanvas");
let ctx = canvas.getContext("2d");

let cigX = 160;
let drops = [];
let lives = 3;
let running = false;

function drawCig(){
  ctx.fillStyle="white";
  ctx.fillRect(cigX-15,350,30,8);

  ctx.fillStyle="orange";
  ctx.fillRect(cigX+15,350,10,8);

  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(cigX-18,354,3,0,Math.PI*2);
  ctx.fill();
}

function updateLives(){
  document.getElementById("lives").textContent = "🔥".repeat(lives);
}

function startCig(){
  lives=3;
  drops=[];
  running=true;
  updateLives();
  loop();
}

function loop(){
  if(!running) return;

  ctx.clearRect(0,0,320,400);

  // rain
  if(Math.random()<0.2){
    drops.push({x:Math.random()*320,y:0});
  }

  drops.forEach(d=>d.y+=5);

  drops = drops.filter(d=>{
    let hit = d.y>340 && d.x>cigX-20 && d.x<cigX+20;
    if(hit){
      lives--;
      updateLives();
      if(lives<=0){
        running=false;
        document.getElementById("cigMsg").textContent="gone. like your sleep schedule";
      }
    }
    return d.y<400 && !hit;
  });

  ctx.fillStyle="#7fc8ff";
  drops.forEach(d=>{
    ctx.fillRect(d.x,d.y,2,10);
  });

  drawCig();

  requestAnimationFrame(loop);
}

canvas.addEventListener("touchmove", e=>{
  cigX = e.touches[0].clientX;
});

/* ---------- CONFETTI ---------- */
window.onload = () => {
  alert("happy birthday mf 🎉");
};

</script>

</body>
</html>
